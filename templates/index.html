<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTR - Reconnaissance de Texte Manuscrit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .upload-section {
            position: relative;
        }

        .upload-area {
            border: 3px dashed #4facfe;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            background: #f8faff;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #00f2fe;
            background: #f0f8ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #00f2fe;
            background: #e6f7ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            color: #4facfe;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        #imageFile {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .preview-section {
            text-align: center;
        }

        .image-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: none;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }

        .analyze-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 30px;
            padding: 25px;
            background: #f8faff;
            border-radius: 15px;
            border-left: 4px solid #4facfe;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-text {
            font-size: 1.2em;
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e6ed;
            margin-bottom: 15px;
            word-break: break-word;
            font-family: 'Georgia', serif;
            color: #2c3e50;
        }

        .confidence-bar {
            background: #e0e6ed;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .confidence-text {
            font-size: 0.9em;
            color: #666;
        }

        .error-section {
            background: #ffe6e6;
            border-left: 4px solid #ff4757;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error-section.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid #e0e6ed;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #4facfe;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .upload-area {
                padding: 40px 20px;
            }
        }

        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 HTR Recognition</h1>
            <p>Reconnaissance Intelligente de Texte Manuscrit</p>
        </div>

        <div class="main-content">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">Glissez votre image ici</div>
                    <div class="upload-subtext">ou cliquez pour sélectionner un fichier</div>
                    <input type="file" id="imageFile" accept="image/*">
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyse en cours...</p>
                </div>

                <div class="error-section" id="errorSection">
                    <h3>❌ Erreur</h3>
                    <p id="errorMessage"></p>
                </div>
            </div>

            <div class="preview-section">
                <img id="imagePreview" class="image-preview" alt="Aperçu de l'image">
                <br>
                <button id="analyzeBtn" class="analyze-btn" disabled>
                    🔍 Analyser le texte
                </button>

                <div class="result-section" id="resultSection">
                    <div class="result-title">
                        📝 Texte reconnu
                        <button class="copy-btn" id="copyBtn">📋 Copier</button>
                    </div>
                    <div class="result-text" id="resultText"></div>
                    
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill"></div>
                    </div>
                    <div class="confidence-text">
                        Confiance: <span id="confidenceText">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="totalAnalyzed">0</div>
                <div class="stat-label">Images analysées</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgConfidence">0%</div>
                <div class="stat-label">Confiance moyenne</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalChars">0</div>
                <div class="stat-label">Caractères reconnus</div>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let stats = {
            totalAnalyzed: 0,
            totalConfidence: 0,
            totalChars: 0
        };

        // Éléments DOM
        const uploadArea = document.getElementById('uploadArea');
        const imageFile = document.getElementById('imageFile');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const errorSection = document.getElementById('errorSection');
        const resultText = document.getElementById('resultText');
        const confidenceFill = document.getElementById('confidenceFill');
        const confidenceText = document.getElementById('confidenceText');
        const copyBtn = document.getElementById('copyBtn');

        // Gestion du drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        // Gestion de la sélection de fichier
        imageFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        // Fonction de gestion de fichier
        function handleFileSelect(file) {
            if (!file.type.startsWith('image/')) {
                showError('Veuillez sélectionner un fichier image valide.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                analyzeBtn.disabled = false;
                hideError();
                hideResult();
            };
            reader.readAsDataURL(file);
        }

        // Analyse de l'image
        analyzeBtn.addEventListener('click', () => {
            const file = imageFile.files[0];
            if (!file) return;

            showLoading();
            hideError();
            hideResult();

            const formData = new FormData();
            formData.append('file', file);

            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    showResult(data.text, data.confidence);
                    updateStats(data.text, data.confidence);
                } else {
                    showError(data.error);
                }
            })
            .catch(error => {
                hideLoading();
                showError('Erreur de connexion: ' + error.message);
            });
        });

        // Copier le texte
        copyBtn.addEventListener('click', () => {
            const text = resultText.textContent;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = '✅ Copié!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copier';
                }, 2000);
            });
        });

        // Fonctions utilitaires
        function showLoading() {
            loading.classList.add('show');
            analyzeBtn.disabled = true;
        }

        function hideLoading() {
            loading.classList.remove('show');
            analyzeBtn.disabled = false;
        }

        function showResult(text, confidence) {
            resultText.textContent = text || 'Aucun texte détecté';
            const confPercent = Math.round(confidence * 100);
            confidenceFill.style.width = confPercent + '%';
            confidenceText.textContent = confPercent + '%';
            resultSection.classList.add('show');
        }

        function hideResult() {
            resultSection.classList.remove('show');
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            errorSection.classList.add('show');
        }

        function hideError() {
            errorSection.classList.remove('show');
        }

        function updateStats(text, confidence) {
            stats.totalAnalyzed++;
            stats.totalConfidence += confidence;
            stats.totalChars += text.length;

            document.getElementById('totalAnalyzed').textContent = stats.totalAnalyzed;
            document.getElementById('avgConfidence').textContent = 
                Math.round((stats.totalConfidence / stats.totalAnalyzed) * 100) + '%';
            document.getElementById('totalChars').textContent = stats.totalChars;
        }

        // Vérification de l'état du serveur au chargement
        fetch('/health')
            .then(response => response.json())
            .then(data => {
                if (!data.model_loaded) {
                    showError('Le modèle n\'est pas chargé correctement.');
                }
            })
            .catch(error => {
                showError('Impossible de se connecter au serveur.');
            });
    </script>
</body>
</html>
